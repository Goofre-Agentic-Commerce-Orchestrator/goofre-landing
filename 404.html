<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA router redirect
        // If the path was /app/something, redirect to /app/
        var path = window.location.pathname;
        if (path.startsWith('/app/')) {
            window.location.replace('/app/');
        }
    </script>
</head>

<body>
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        <h2>404 - Page Not Found</h2>
        <p>If you were looking for the Goofre App, <a href="/app/" target="_blank" rel="noopener noreferrer">click here to return to the Dashboard</a>.</p>
        <p>Otherwise, return to the <a href="/" target="_blank" rel="noopener noreferrer">Goofre Homepage</a>.</p>
    </div>
</body>

</html>
