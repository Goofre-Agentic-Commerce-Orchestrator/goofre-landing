<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goofre | Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        goofre: '#5F3192',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

    <div class="max-w-md w-full text-center">
        <div class="mb-4">
            <div class="w-12 h-12 bg-goofre rounded-xl flex items-center justify-center mx-auto shadow-lg">
                <span class="text-white font-black text-xl">G</span>
            </div>
        </div>
        <h1 class="font-display font-bold text-3xl mb-3 text-goofre">The Library</h1>
        <p class="text-zinc-500 mb-8">We are currently curating the Goofre Library. Check back soon for deep-dives, documentation, and agentic commerce resources.</p>
        <a href="/" class="inline-flex items-center text-sm font-medium text-goofre hover:underline opacity-80 hover:opacity-100 transition-opacity">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Return to Home
        </a>

</html>
