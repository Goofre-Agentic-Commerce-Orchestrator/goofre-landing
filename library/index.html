## Legacy Webhook Architecture

In traditional setups, integrating deeply with Merchant Center required point-to-point connections. Goofre OS acts as a centralized orchestrator.

When a product is updated on Shopify, BigCommerce, or Medusa, a webhook is fired to the Goofre ingest boundary.

The process follows:
1. **Validation:** Verifying the HMAC signature.
2. **Transformation:** Normalizing the payload into the Universal Commerce Protocol (UCP) format.
3. **Distribution:** Queuing the payload to Google APIs via the API wrapper.

For more on the underlying data format, check out {{bridge:blog-1}}.

### Code Implementation

In code mode, you can see how the ingest controller handles the incoming POST request.

\`\`\`typescript
export async function POST(req: Request) {
    const rawBody = await req.text()
    const signature = req.headers.get('x-hmac-sha256')
    // Verification...
    const event = JSON.parse(rawBody)

    await enqueueTransformation(event)
    return new Response('Queued', { status: 202 })
}
\`\`\`
`

                readTime: '8 min',
                tags: ['Thought Leadership', 'Standards'],
                content: `
## Why UCP?

Current AI Agents struggle with unstructured product data. If you ask Gemini to "find me a blue shirt under $50", it relies on scraping web pages containing that text, which is slow and often inaccurate.

The **Universal Commerce Protocol (UCP)** defines a strict schema that allows merchants to pass structural graph data directly to search agents.

### The Problem

- HTML microdata is often ignored or poorly implemented.
- JSON-LD is useful for SEO, but lacks transactional capabilities (adding to cart).
- Merchant Center feeds are rigid and isolated.

### The Solution

A unified standard. By adopting UCP, agents can programmatically traverse a product catalog, query variant availability in real time, and execute a checkout vector—all without loading a webpage.

Learn more about how Goofre processes incoming data in {{bridge:module-1}}.
`

Traditional analytics rely on pixels and pageviews. In Agentic Commerce, there are no pages. A user might complete an entire purchase inside a WhatsApp chat powered by Gemini.

How do you attribute the sale?

### Event Signatures

Goofre captures telemetry at the API layer. Every time a cart is modified or completed, an event is emitted encapsulating the \`agent_source\`, \`session_id\`, and \`intent_vector\`.

\`\`\`json
{
  "event_type": "checkout.completed",
  "source": "gemini_voice_assistant",

}
\`\`\`
`

                <div onclick="switchSheet('${targetId}')" class="my-6 border border-bordercolor bg-[#151518] hover:bg-[#1a1a1e] rounded-xl p-4 cursor-pointer transition-all flex items-center justify-between group shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="p-2 bg-zinc-900 rounded-lg border border-zinc-800 group-hover:border-goofre/50 transition-colors">
                            ${getIconForType(target.type)}
                        </div>
                        <div>
                            <div class="text-[10px] font-mono uppercase tracking-widest text-muted mb-1">Related ${target.type}</div>
                            <div class="font-medium text-white group-hover:text-goofre transition-colors text-sm">${target.title}</div>
                        </div>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-muted group-hover:text-goofre transition-colors transform group-hover:translate-x-1"></i>
                </div>
            `;
        }

        function renderMarkdown(rawMd) {
            const html = marked.parse(rawMd);
            
            // Regex to find {{bridge:id}}
            const bridgeRegex = /\{\{bridge:([^}]+)\}\}/g;
            return html.replace(bridgeRegex, (match, targetId) => {
                return createBridgeHtml(targetId);
            });
        }

        // --- SIDE SHEET UI ---
        function openSheet(id) {
            const item = libraryData.find(d => d.id === id);
            if (!item) return;

            currentSheetId = id;

            // Render Header & Markdown
            const fontClass = 'font-sans'; // Always font-sans
            
            sheetContent.innerHTML = `
                <div class="mb-8">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="p-2 bg-zinc-900 rounded-lg border border-zinc-800 shadow-sm">
                            ${getIconForType(item.type)}
                        </div>
                        <span class="text-xs font-mono text-muted uppercase tracking-widest bg-zinc-900 px-2 py-1 rounded-md border border-zinc-800">
                            ${item.type}
                        </span>
                        <span class="text-xs font-mono text-muted">·</span>
                        <span class="text-xs font-mono text-muted">${item.readTime}</span>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight ${fontClass}">${item.title}</h1>
                    <p class="text-lg text-muted">${item.description}</p>
                </div>
                
                <div class="w-full h-px bg-bordercolor mb-8"></div>
                
                <div class="${fontClass} markdown-body">
                    ${renderMarkdown(item.content)}
                </div>
            `;

            lucide.createIcons();

            // Set URL
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('id', id);
            window.history.pushState({ id }, '', newUrl);

            // Animate In
            sheetOverlay.classList.remove('opacity-0', 'pointer-events-none');
            sheetOverlay.classList.add('opacity-100');
            sideSheet.classList.remove('translate-x-full');
            sideSheet.classList.add('translate-x-0');
        }

        function closeSheet() {
            sheetOverlay.classList.remove('opacity-100');
            sheetOverlay.classList.add('opacity-0', 'pointer-events-none');
            sideSheet.classList.remove('translate-x-0');
            sideSheet.classList.add('translate-x-full');

            // Clear URL
            const newUrl = new URL(window.location);
            newUrl.searchParams.delete('id');
            window.history.pushState({}, '', newUrl);
            
            currentSheetId = null;
        }

        function switchSheet(id) {
            // Briefly fade content then swap
            sheetContent.style.opacity = '0';
            setTimeout(() => {
                openSheet(id);
                sheetContent.style.opacity = '1';
                sheetContent.scrollTo(0,0);
            }, 200);
        }

        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied to clipboard!');
            });
        }

        // --- CONTROLS ---
        function setFilter(type) {
            currentFilter = type;
            
            // Update Active Tab Styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.filter === type) {
                    btn.classList.remove('text-muted', 'hover:bg-zinc-800/50');
                    btn.classList.add('text-white', 'bg-zinc-800');
                } else {
                    btn.classList.add('text-muted', 'hover:bg-zinc-800/50');
                    btn.classList.remove('text-white', 'bg-zinc-800');
                }
            });

            renderGrid();
        }

        // toggleDevMode removed — concept-only mode
        function _unused_toggleDevMode() {
            isDevMode = !isDevMode;
            
            if(isDevMode) {
                devToggleThumb.classList.remove('translate-x-1');
                devToggleThumb.classList.add('translate-x-6');
                
                labelConcept.classList.replace('text-goofre', 'text-muted');
                labelConcept.classList.replace('font-semibold', 'font-normal');
                
                labelCode.classList.replace('text-muted', 'text-goofre');
                labelCode.classList.replace('font-normal', 'font-semibold');
            } else {
                devToggleThumb.classList.remove('translate-x-6');
                devToggleThumb.classList.add('translate-x-1');
                
                labelConcept.classList.replace('text-muted', 'text-goofre');
                labelConcept.classList.replace('font-normal', 'font-semibold');
                
                labelCode.classList.replace('text-goofre', 'text-muted');
                labelCode.classList.replace('font-semibold', 'font-normal');
            }

            renderGrid();

            // Re-render open sheet if present
            if (currentSheetId) {
                const sheetScroll = sheetContent.scrollTop;
                openSheet(currentSheetId);
                sheetContent.scrollTop = sheetScroll;
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Check URL parameters for direct link
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id');
            
            renderGrid();
            lucide.createIcons();

            if (idParam) {
                // Short timeout to ensure icons and grid render before animating
                setTimeout(() => openSheet(idParam), 100);
            }
        });

        // Handle back/forward browser buttons closing/opening sheet
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.id) {
                openSheet(e.state.id);
            } else {
                // Determine if URL has ID (if arrived via a bookmark)
                const urlParams = new URLSearchParams(window.location.search);
                const idParam = urlParams.get('id');
                if (idParam) openSheet(idParam);
                else closeSheet();
            }
        });
    </script>
</body>

</html>
